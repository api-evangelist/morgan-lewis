aid: morgan-lewis
name: Morgan, Lewis & Bockius LLP
description: >-
  Morgan, Lewis & Bockius LLP is a global Am Law 10 firm with approximately
  2,200 lawyers and 39 offices across North America, Europe, Asia, and the
  Middle East. The firm provides corporate, transactional, litigation, and
  regulatory services across energy, financial services, healthcare, life
  sciences, retail and ecommerce, sports, technology, and transportation,
  with widely recognized depth in employee benefits and executive compensation,
  fintech and financial services regulation, intellectual property, and M&A.
  Morgan Lewis does not publish a public developer API, SDK, OpenAPI spec,
  or machine-readable data product; its public technology surface is limited
  to its corporate website, an email-alert subscription managed through a
  Real Magnet (REACTION) marketing platform, and a portfolio of LexBlog-style
  practice blogs covering specific subject areas.
